<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shampoo Barcode Scanner</title>
    <link rel="stylesheet" href="/css/style.css" />
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-icon">🧴</div>
            <h1>Shampoo Scanner</h1>
            <p>Scan a barcode to look up product details</p>
        </div>

        <div class="scanner-section" id="scannerSection">
            <div id="reader"></div>

            <div class="scan-tabs">
                <button class="tab-btn active" id="tabCamera" onclick="switchTab('camera')">📷 Live Camera</button>
                <button class="tab-btn" id="tabFile" onclick="switchTab('file')">🖼️ Image Upload</button>
            </div>

            <div id="cameraPanel">
                <button class="btn btn-primary" id="startBtn" onclick="startScanner()">
                    📷 Scan with Camera
                </button>
                <button class="btn btn-danger hidden" id="stopBtn" onclick="stopScanner()">
                    ⛔ Stop Camera
                </button>
            </div>

            <div id="filePanel" class="hidden">
                <label class="file-upload-label" for="fileInput">
                    <span>📁 Select Barcode Image</span>
                    <small>Upload a photo or screenshot of the barcode</small>
                </label>
                <input type="file" id="fileInput" accept="image/*" onchange="scanFromFile(this)" />
            </div>
        </div>

        <div class="manual-section">
            <p class="or-divider">— or enter barcode manually —</p>
            <div class="input-row">
                <input type="text" id="manualInput" placeholder="Enter barcode here..." />
                <button class="btn btn-secondary" onclick="lookupManual()">🔍 Search</button>
            </div>
        </div>

        <div class="result-card hidden" id="resultCard">
            <div class="result-icon">✅</div>
            <div class="result-details">
                <div class="result-row">
                    <span class="label">Material Code:</span>
                    <span class="value" id="resMaterial">—</span>
                </div>
                <div class="result-row">
                    <span class="label">Product Name:</span>
                    <span class="value" id="resName">—</span>
                </div>
                <div class="result-row">
                    <span class="label">Capacity:</span>
                    <span class="value" id="resCapacity">—</span>
                </div>
                <div class="result-row price-row">
                    <span class="label">Price:</span>
                    <span class="value price" id="resPrice">—</span>
                </div>
            </div>
        </div>

        <div class="error-card hidden" id="errorCard">
            <div class="error-icon">❌</div>
            <p id="errorMsg">An error occurred.</p>
        </div>

        <div class="loading hidden" id="loading">
            <div class="spinner"></div>
            <p>Searching...</p>
        </div>

        <div class="samples-section">
            <h3>Sample Codes (for testing)</h3>
            <div class="samples-grid">
                <button class="sample-btn" onclick="testBarcode('65070013')">65070013<br/><small>Lifebuoy Herbal</small></button>
                <button class="sample-btn" onclick="testBarcode('65235936')">65235936<br/><small>Sunsilk Sunrise</small></button>
                <button class="sample-btn" onclick="testBarcode('65648914')">65648914<br/><small>Clear Deep Cleanse</small></button>
                <button class="sample-btn" onclick="testBarcode('64993474')">64993474<br/><small>Dove Intense Repair</small></button>
            </div>
        </div>
    </div>

    <script src="/js/app.js?v=6"></script>
</body>
</html>
